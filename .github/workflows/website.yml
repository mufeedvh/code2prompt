name: Gnaw Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

# Only the latest run for a ref needs to finish; cancel older in-flight runs.
concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Zola
        env:
          ZOLA_VERSION: "0.22.1" # TODO: pin to the version you build/test against locally
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz
          sudo mv zola /usr/local/bin/zola
          zola --version

      - name: Build site
        working-directory: website
        run: zola build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/public --project-name=gnaw-website --branch=main
