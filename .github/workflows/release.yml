# Tag push -> create a GitHub Release with binaries, then publish to crates.io.

name: Gnaw Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write          # needed to create the release / attach binaries

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- 1. Quality gate — must pass before anything ships ----
  gate:
    name: Format, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p gnaw-core -p gnaw-ctx --all-targets -- -D warnings
      - run: cargo test  -p gnaw-core -p gnaw-ctx

  # ---- 2. Build a release binary per target ----
  build:
    name: Build ${{ matrix.target }}
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}      # NB: "targets" (plural); "target" is silently ignored

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # libclang for any C-binding deps on Windows (kept from your original;
      # remove if the Windows build is green without it).
      - name: Cache LLVM on Windows
        if: runner.os == 'Windows'
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: C:\Program Files\LLVM
          key: windows-llvm-latest
      - name: Install LLVM on Windows
        if: runner.os == 'Windows' && steps.cache-llvm.outputs.cache-hit != 'true'
        run: choco install llvm

      - name: Build
        run: cargo build --release -p gnaw-ctx --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/gnaw" "dist/gnaw-${{ matrix.target }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gnaw.exe" "dist/gnaw-${{ matrix.target }}.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: gnaw-${{ matrix.target }}
          path: dist/*

  # ---- 3. Create the GitHub Release with all binaries ----
  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true          # flatten every matrix artifact into ./dist

      - name: Create release and attach binaries
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # built-in; no PAT needed

  # ---- 4. Publish crates, only after the release exists ----
  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # gnaw-ctx depends on gnaw-core, so core must reach the index first.
      # cargo (>=1.66) waits for the new version to appear before returning,
      # so the second publish resolves the dependency cleanly.
      - run: cargo publish -p gnaw-core
      - run: cargo publish -p gnaw-ctx
